<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Rhythm - Mobile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

        :root {
            --bg-color: #0b0c10;
            --primary: #45f3ff;
            --secondary: #ff007c;
            --text: #c5c6c7;
        }

        * {
            box-sizing: border-box;
            user-select: none; /* Evita selecionar texto ao tocar */
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden; /* Evita rolagem na tela */
            width: 100vw;
            height: 100vh;
        }

        /* --- MENU --- */
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: transparent;
            -webkit-text-stroke: 1px var(--primary);
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.5);
            letter-spacing: 2px;
        }

        p.subtitle {
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn-upload {
            border: 2px dashed var(--primary);
            color: var(--primary);
            background-color: transparent;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            height: 100%;
        }

        #playBtn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 124, 0.6);
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none; /* Desativado inicialmente */
            transition: all 0.3s ease;
        }

        #playBtn.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1.05);
        }

        #playBtn.active:active {
            transform: scale(0.95);
        }

        #status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--primary);
            min-height: 20px;
        }

        /* --- JOGO --- */
        #gameContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Escondido até o jogo começar */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            color: white;
            text-shadow: 0 0 10px var(--primary);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>NEON BEAT</h1>
        <p class="subtitle">Escolha um áudio/vídeo da galeria (Máx: 5 min)</p>

        <div class="upload-btn-wrapper">
            <button class="btn-upload" id="uploadLabel">📁 Selecionar Arquivo</button>
            <input type="file" id="fileInput" accept="audio/*, video/*">
        </div>

        <button id="playBtn">TOCAR</button>
        <div id="status">Aguardando mídia...</div>
    </div>

    <div id="gameContainer">
        <div id="ui">SCORE: <span id="scoreDisplay">0</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const gameContainer = document.getElementById('gameContainer');
        const fileInput = document.getElementById('fileInput');
        const playBtn = document.getElementById('playBtn');
        const statusText = document.getElementById('status');
        const uploadLabel = document.getElementById('uploadLabel');
        const scoreDisplay = document.getElementById('scoreDisplay');

        // Ajustar canvas para tela do celular
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Configurações do jogo
        const COLS = 4;
        const COL_WIDTH = canvas.width / COLS;
        const HIT_AREA_HEIGHT = canvas.height * 0.15; // Área de toque na base
        const HIT_LINE_Y = canvas.height - HIT_AREA_HEIGHT;
        const NOTE_HEIGHT = canvas.height * 0.08;
        const NOTE_SPEED = canvas.height * 0.6; // Velocidade baseada na altura da tela
        const MAX_DURATION = 300; // 5 minutos

        // Cores vibrantes para cada coluna
        const colColors = ['#ff0055', '#00f3ff', '#39ff14', '#ffea00'];

        let audioContext;
        let audioBuffer;
        let audioSource;
        let startTime = 0;
        let notes = [];
        let isPlaying = false;
        let score = 0;

        // Controle de toques (Mobile)
        const keysPressed = { 0: false, 1: false, 2: false, 3: false };

        // Processar o arquivo quando escolhido
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            uploadLabel.innerText = "🎵 " + (file.name.length > 15 ? file.name.substring(0, 15) + "..." : file.name);
            statusText.innerText = "Lendo arquivo...";
            playBtn.classList.remove('active');

            // Criar o contexto de áudio
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            const arrayBuffer = await file.arrayBuffer();
            
            try {
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                if (audioBuffer.duration > MAX_DURATION) {
                    statusText.innerText = "Erro: O arquivo tem mais de 5 minutos!";
                    statusText.style.color = "#ff007c";
                    return;
                }

                statusText.innerText = "Áudio pronto! Clique em TOCAR.";
                statusText.style.color = "#39ff14";
                
                // Analisa as batidas
                notes = detectBeats(audioBuffer);
                
                // Ativa o botão de jogar
                playBtn.classList.add('active');
            } catch (err) {
                statusText.innerText = "Erro ao ler o áudio. Tente outro arquivo.";
                statusText.style.color = "#ff007c";
            }
        });

        // Botão Jogar
        playBtn.addEventListener('click', () => {
            if (!audioBuffer) return;
            
            // Oculta menu, mostra jogo
            menu.style.display = 'none';
            gameContainer.style.display = 'block';
            
            // É necessário dar "resume" no áudio após interação do usuário em celulares
            if(audioContext.state === 'suspended') {
                audioContext.resume();
            }

            startGame();
        });

        // Eventos de Toque na tela (Mobile Touch)
        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('touchmove', handleTouch, { passive: false });
        canvas.addEventListener('touchend', releaseTouch, { passive: false });
        canvas.addEventListener('touchcancel', releaseTouch, { passive: false });

        function handleTouch(e) {
            e.preventDefault(); // Impede rolagem ou zoom
            // Reseta todas as teclas
            for(let key in keysPressed) keysPressed[key] = false;
            
            // Verifica onde os dedos estão tocando
            for (let i = 0; i < e.touches.length; i++) {
                let touch = e.touches[i];
                let col = Math.floor(touch.clientX / COL_WIDTH);
                if(col >= 0 && col < COLS) {
                    keysPressed[col] = true;
                }
            }
        }

        function releaseTouch(e) {
            e.preventDefault();
            for(let key in keysPressed) keysPressed[key] = false;
            // Reativa as teclas que ainda têm dedos tocando
            for (let i = 0; i < e.touches.length; i++) {
                let touch = e.touches[i];
                let col = Math.floor(touch.clientX / COL_WIDTH);
                if(col >= 0 && col < COLS) {
                    keysPressed[col] = true;
                }
            }
        }

        // Algoritmo de detecção de batidas
        function detectBeats(buffer) {
            const data = buffer.getChannelData(0);
            const sampleRate = buffer.sampleRate;
            const step = Math.floor(sampleRate * 0.1); 
            const generatedNotes = [];

            let totalVolume = 0;
            for(let i = 0; i < data.length; i += 100) {
                totalVolume += Math.abs(data[i]);
            }
            const averageVolume = totalVolume / (data.length / 100);
            const threshold = averageVolume * 2.8; // Sensibilidade do ritmo

            for (let i = 0; i < data.length; i += step) {
                let max = 0;
                for (let j = 0; j < step && (i + j) < data.length; j++) {
                    let val = Math.abs(data[i + j]);
                    if (val > max) max = val;
                }

                if (max > threshold) {
                    generatedNotes.push({
                        time: i / sampleRate,
                        col: Math.floor(Math.random() * COLS),
                        hit: false,
                        missed: false
                    });
                }
            }
            return generatedNotes;
        }

        function startGame() {
            if (audioSource) audioSource.disconnect();
            
            audioSource = audioContext.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(audioContext.destination);
            
            score = 0;
            scoreDisplay.innerText = score;
            isPlaying = true;
            startTime = audioContext.currentTime;
            
            audioSource.start();
            
            audioSource.onended = () => {
                isPlaying = false;
                setTimeout(() => {
                    alert("Fim da música! Pontuação Final: " + score);
                    menu.style.display = 'flex';
                    gameContainer.style.display = 'none';
                    playBtn.classList.remove('active');
                    uploadLabel.innerText = "📁 Selecionar Arquivo";
                    statusText.innerText = "Jogue novamente!";
                }, 1000);
            };

            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!isPlaying) return;

            const currentTime = audioContext.currentTime - startTime;

            // Limpa o canvas
            ctx.fillStyle = 'rgba(11, 12, 16, 0.8)'; // Efeito de rastro leve
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha as pistas (Colunas)
            for (let i = 0; i < COLS; i++) {
                // Divisórias
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(i * COL_WIDTH, 0);
                ctx.lineTo(i * COL_WIDTH, canvas.height);
                ctx.stroke();

                // Área de toque inferior
                ctx.fillStyle = keysPressed[i] ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 255, 255, 0.05)';
                ctx.fillRect(i * COL_WIDTH, HIT_LINE_Y, COL_WIDTH, HIT_AREA_HEIGHT);

                // Efeito neon nos botões pressionados
                if (keysPressed[i]) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = colColors[i];
                    ctx.fillStyle = colColors[i];
                    ctx.fillRect((i * COL_WIDTH) + 5, HIT_LINE_Y, COL_WIDTH - 10, 5);
                    ctx.shadowBlur = 0; // reseta
                }
            }

            // Linha de acerto (Hit Line)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, HIT_LINE_Y);
            ctx.lineTo(canvas.width, HIT_LINE_Y);
            ctx.stroke();

            // Lógica das Notas
            notes.forEach(note => {
                if (note.hit || note.missed) return;

                const y = HIT_LINE_Y - ((note.time - currentTime) * NOTE_SPEED);

                // Se a nota passou muito da linha e não foi tocada
                if (y > canvas.height) {
                    note.missed = true;
                    return;
                }

                // Desenha a nota se estiver na tela
                if (y > -NOTE_HEIGHT && y < canvas.height) {
                    // Visual da nota (Cores neon dependendo da coluna)
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = colColors[note.col];
                    ctx.fillStyle = colColors[note.col];
                    
                    // Nota com cantos arredondados simulados
                    const margin = 10;
                    ctx.fillRect((note.col * COL_WIDTH) + margin, y, COL_WIDTH - (margin*2), NOTE_HEIGHT);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect((note.col * COL_WIDTH) + margin + 5, y + 5, COL_WIDTH - (margin*2) - 10, NOTE_HEIGHT - 10);
                    
                    ctx.shadowBlur = 0; // reseta para não bugar outros desenhos

                    // Lógica de Acerto (Colisão)
                    // Verifica se o jogador está tocando na coluna e se a nota está na área do hit
                    if (keysPressed[note.col] && Math.abs(y - HIT_LINE_Y) < (NOTE_HEIGHT + 20)) {
                        note.hit = true;
                        score += 10;
                        scoreDisplay.innerText = score;
                        // Efeito visual rápido de acerto (piscar tela ou algo parecido pode ser adicionado aqui)
                    }
                }
            });

            requestAnimationFrame(gameLoop);
        }

        // Atualiza o tamanho do canvas se a pessoa girar o celular
        window.addEventListener('resize', () => {
            if(canvas.width !== window.innerWidth) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
          </html>
