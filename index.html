<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎹 RITMO VIOLETA – Piano 4 Teclas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #1a0b2e, #0a0615);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        /* Estrutura de APP - tela vertical fixa */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 780px;
            background: #120b1f;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.8), 0 0 0 2px #6b3f9f inset, 0 0 15px #a55de0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #8a4fcf;
        }

        /* loading overlay */
        .loading-screen {
            position: absolute;
            inset: 0;
            background: #0f0820;
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(2px);
        }
        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }
        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid #2e1a47;
            border-top: 8px solid #b77ef0;
            border-radius: 50%;
            animation: spin 1.2s infinite cubic-bezier(0.6, 0.1, 0.4, 0.9);
            box-shadow: 0 0 20px #b77ef0;
        }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        .loading-text {
            color: #dec3ff;
            font-weight: 600;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #a069d6;
        }

        /* Tela principal */
        .main-ui {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px 14px 10px 14px;
            gap: 12px;
            background: #0c0819;
        }

        /* CABEÇALHO + INFOS */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1233;
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #7a48b3;
            box-shadow: 0 5px 0 #3d2560, 0 8px 16px black;
        }
        .percent-box {
            background: #0d0620;
            color: #e6d0ff;
            font-weight: 800;
            font-size: 1.5rem;
            padding: 6px 14px;
            border-radius: 40px;
            letter-spacing: 1px;
            text-shadow: 0 0 12px #b273ff;
            border: 1px solid #ad6eff;
        }
        .combo-box {
            background: #2b1942;
            color: #f2dcff;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid #bf92ff;
            box-shadow: inset 0 -3px 0 #4f2e7a;
        }
        .comemoration-toggle {
            background: #392a55;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #b175ff;
            box-shadow: 0 0 8px violet;
        }

        /* área das notas (simulação) */
        .track-area {
            background: #0f0522;
            border-radius: 40px 40px 16px 16px;
            padding: 12px 6px;
            display: flex;
            gap: 8px;
            justify-content: center;
            border: 2px solid #6b399b;
            box-shadow: inset 0 0 30px #210e38, 0 10px 20px black;
            flex: 1;
            min-height: 200px;
            position: relative;
        }
        .lane {
            flex: 1;
            background: #180b29;
            border-radius: 40px 40px 12px 12px;
            border-bottom: 8px solid #3d1d63;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 -10px 8px #0a0318, 0 0 0 2px #a35eff;
        }
        .hit-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 32px;
            background: rgba(170, 90, 255, 0.25);
            border-top: 3px solid #c58aff;
            box-shadow: 0 -8px 20px #b14eff;
            backdrop-filter: blur(1px);
        }
        .fake-note, .long-note, .short-note {
            position: absolute;
            width: 90%;
            left: 5%;
            background: linear-gradient(145deg, #cb9eff, #9a4dff);
            border-radius: 20px 20px 4px 4px;
            box-shadow: 0 0 20px #d29eff, 0 4px 0 #491d86;
            border: 1px solid white;
        }
        .fake-note { background: #5a2d8a; opacity: 0.8; box-shadow: 0 0 10px red; }
        .long-note { height: 80px; background: linear-gradient(145deg, #b77ef0, #6b32b0); }

        /* teclado */
        .piano-keys {
            display: flex;
            gap: 8px;
            padding: 12px 4px;
            background: #1b1130;
            border-radius: 60px 60px 30px 30px;
            border: 2px solid #9b62db;
            box-shadow: 0 -3px 0 #321f4a, 0 15px 20px black;
        }
        .key {
            flex: 1;
            background: #d7b9ff;
            height: 130px;
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 10px 0 #5f2e97, 0 8px 20px #c78eff;
            transition: 0.06s linear;
            cursor: pointer;
            border-bottom: 6px solid white;
            position: relative;
        }
        .key.pressed {
            background: #f2e2ff;
            transform: translateY(8px);
            box-shadow: 0 2px 0 #6f42b3, 0 0 40px #cb9eff;
        }
        .key::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: rgba(128, 0, 255, 0.2);
            border-radius: 0 0 20px 20px;
            pointer-events: none;
        }

        /* painel dificuldade */
        .difficulty-panel {
            background: #1d1135;
            border-radius: 80px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #bc86ff;
        }
        .difficulty-panel input {
            width: 80px;
            background: #0f0423;
            border: 2px solid #b27eff;
            color: #f3dbff;
            font-size: 1.7rem;
            text-align: center;
            border-radius: 40px;
            padding: 4px 0;
            font-weight: bold;
        }
        .difficulty-panel label { color: #d9b9ff; font-weight: 600; }

        /* botoes */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .btn {
            background: #2f1d4a;
            border: none;
            border-bottom: 5px solid #6f3faf;
            padding: 12px 18px;
            border-radius: 60px;
            font-weight: 700;
            color: #eeddff;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            flex: 1 0 auto;
            box-shadow: 0 5px 0 #2b1545, 0 8px 16px black;
            transition: 0.07s;
            cursor: pointer;
        }
        .btn:active { transform: translateY(5px); border-bottom-width: 2px; }

        .comemoration-pop {
            background: #4d2b81;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 2.2rem;
            font-weight: 900;
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            border: 3px solid #f2c8ff;
            box-shadow: 0 0 60px #e2a2ff;
            text-shadow: 3px 3px 0 #3c1b60;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .hidden { display: none; }

        .score-screen {
            background: #1b0f2d;
            border-radius: 48px;
            padding: 20px;
            border: 3px solid #ad5dff;
            box-shadow: inset 0 0 30px #1a072e;
            margin: 10px 0;
            color: #f0d9ff;
        }
        .grade { font-size: 2rem; font-weight: 900; color: #ffd966; text-align: center; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">

    <!-- Tela de carregamento -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div class="loading-text">CARREGANDO PARTITURA</div>
        <div class="loading-text" style="font-size: 1rem;">SINCRONIZANDO · 4 TECLAS</div>
    </div>

    <!-- UI principal -->
    <div class="main-ui" id="mainUI">

        <div class="top-bar">
            <span class="percent-box" id="percentDisplay">0.0000%</span>
            <span class="combo-box" id="comboDisplay">0</span>
            <button class="comemoration-toggle" id="toggleCelebration" title="desativar comemoração">🎉</button>
        </div>

        <!-- área onde as notas caem (visual) -->
        <div class="track-area" id="trackArea">
            <div class="lane" id="lane0"><div class="hit-area"></div></div>
            <div class="lane" id="lane1"><div class="hit-area"></div></div>
            <div class="lane" id="lane2"><div class="hit-area"></div></div>
            <div class="lane" id="lane3"><div class="hit-area"></div></div>
        </div>

        <!-- teclas piano -->
        <div class="piano-keys" id="pianoKeys">
            <div class="key" data-key="0" id="key0"></div>
            <div class="key" data-key="1" id="key1"></div>
            <div class="key" data-key="2" id="key2"></div>
            <div class="key" data-key="3" id="key3"></div>
        </div>

        <!-- painel dificuldade e controles -->
        <div class="difficulty-panel">
            <label>🔥 NÍVEL <input type="number" id="difficultySlider" min="1" max="10" value="1" step="1"></label>
            <span style="color:#bb9bff;" id="difficultyDesc">fácil</span>
        </div>

        <div class="action-buttons">
            <button class="btn" id="startGameBtn">▶ INICIAR</button>
            <button class="btn" id="exportAudioBtn">📤 EXPORTAR ÁUDIO</button>
            <button class="btn" id="tutorialBtn">❓ TUTORIAL</button>
            <button class="btn" id="feedbackBtn">💬 FEEDBACK</button>
            <button class="btn" id="createOwnBtn">🎼 CRIAR RITMO</button>
            <button class="btn" id="playAgainBtn">🔄 TENTAR NOVAMENTE</button>
        </div>

        <!-- área de resultados pós-jogo -->
        <div class="score-screen" id="resultScreen">
            <div id="gradeResult" class="grade">-</div>
            <div>ACERTO: <span id="finalPercent">0.0000%</span></div>
            <div>MAIOR COMBO: <span id="maxCombo">0</span></div>
            <div>⭐ PERFECT: <span id="perfectCount">0</span>  VERY GOOD: <span id="verygoodCount">0</span> GOOD: <span id="goodCount">0</span></div>
            <div>⚡ BAD: <span id="badCount">0</span>  MISS: <span id="missCount">0</span></div>
            <div style="font-size:0.8rem; color:#b380ff;">notas longas/falsas simuladas</div>
        </div>
    </div>

    <!-- comemoração flutuante -->
    <div id="celebrationMessage" class="comemoration-pop hidden">🔥 100 COMBO</div>
</div>

<script>
    (function() {
        // ---- config ----
        const LANES = 4;
        let loadingScreen = document.getElementById('loadingScreen');
        let mainUI = document.getElementById('mainUI');
        let percentSpan = document.getElementById('percentDisplay');
        let comboSpan = document.getElementById('comboDisplay');
        let celebrationDiv = document.getElementById('celebrationMessage');
        let toggleCelebBtn = document.getElementById('toggleCelebration');
        let difficultyInput = document.getElementById('difficultySlider');
        let difficultyDesc = document.getElementById('difficultyDesc');
        let resultScreen = document.getElementById('resultScreen');
        // elementos resultados
        let gradeSpan = document.getElementById('gradeResult');
        let finalPercent = document.getElementById('finalPercent');
        let maxComboSpan = document.getElementById('maxCombo');
        let perfectSpan = document.getElementById('perfectCount');
        let verygoodSpan = document.getElementById('verygoodCount');
        let goodSpan = document.getElementById('goodCount');
        let badSpan = document.getElementById('badCount');
        let missSpan = document.getElementById('missCount');

        // estado do jogo
        let gameActive = false;
        let combo = 0;
        let maxComboValue = 0;
        let totalNotes = 0;
        let hitScore = 0;       // soma para percentual (perfect = 1, verygood=0.8, good=0.6, bad=0.2, miss=0)
        let perfect = 0, verygood = 0, good = 0, bad = 0, miss = 0;
        let celebrationEnabled = true;
        let currentComboMilestone = 0;

        // funções de atualização de interface
        function updatePercent() {
            if (totalNotes === 0) {
                percentSpan.innerText = '0.0000%';
                return;
            }
            let perc = (hitScore / totalNotes) * 100;
            percentSpan.innerText = perc.toFixed(4) + '%';
        }

        function updateCombo() {
            comboSpan.innerText = combo;
            if (combo > maxComboValue) maxComboValue = combo;
            // milestones
            if (!celebrationEnabled) return;
            const milestones = [1,5,10,25,50,75,100,250,500,750,1000,1500,2000,2500,3000];
            if (milestones.includes(combo) && combo > currentComboMilestone) {
                currentComboMilestone = combo;
                celebrationDiv.innerText = `🎊 ${combo} COMBO 🎊`;
                celebrationDiv.classList.remove('hidden');
                setTimeout(() => celebrationDiv.classList.add('hidden'), 1200);
            }
        }

        // simulação de toque nas teclas
        function pressKey(index) {
            if (!gameActive) return;
            // simulando julgamento aleatório para demonstração
            let rand = Math.random();
            let judgement = '';
            if (rand < 0.2) { miss++; judgement = 'MISS'; hitScore += 0; combo = 0; }
            else if (rand < 0.4) { bad++; judgement = 'BAD'; hitScore += 0.2; combo = 0; }
            else if (rand < 0.6) { good++; judgement = 'GOOD'; hitScore += 0.6; combo += 1; }
            else if (rand < 0.8) { verygood++; judgement = 'VERY GOOD'; hitScore += 0.8; combo += 1; }
            else { perfect++; judgement = 'PERFECT'; hitScore += 1; combo += 1; }

            totalNotes++; 
            updatePercent();
            updateCombo();

            // feedback visual na tecla
            let key = document.getElementById('key'+index);
            key.classList.add('pressed');
            setTimeout(() => key.classList.remove('pressed'), 120);

            // mostrar julgamento flutuante (opcional)
        }

        // eventos das teclas (mouse e toque)
        for (let i = 0; i < LANES; i++) {
            document.getElementById('key'+i).addEventListener('mousedown', (e) => { e.preventDefault(); pressKey(parseInt(e.currentTarget.dataset.key)); });
            document.getElementById('key'+i).addEventListener('touchstart', (e) => { e.preventDefault(); pressKey(parseInt(e.currentTarget.dataset.key)); });
        }

        // teclado PC: A S D F (respectivamente)
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            let key = e.key.toLowerCase();
            let map = { 'a':0, 's':1, 'd':2, 'f':3 };
            if (map.hasOwnProperty(key)) {
                e.preventDefault();
                pressKey(map[key]);
            }
        });

        // Loading some segundos
        setTimeout(() => {
            loadingScreen.classList.add('hide');
        }, 2000);

        // Dificuldade desc
        function updateDiffDesc() {
            let val = parseInt(difficultyInput.value);
            if (val <=4) difficultyDesc.innerText = 'fácil';
            else if (val <=7) difficultyDesc.innerText = 'médio';
            else difficultyDesc.innerText = 'rápido / notas falsas';
        }
        difficultyInput.addEventListener('input', updateDiffDesc);
        updateDiffDesc();

        // Iniciar jogo
        document.getElementById('startGameBtn').addEventListener('click', ()=>{
            gameActive = true;
            combo = 0; maxComboValue = 0; totalNotes = 0; hitScore = 0; perfect=0; verygood=0; good=0; bad=0; miss=0; currentComboMilestone=0;
            updatePercent(); updateCombo();
            // esconder resultados antigos
            resultScreen.style.display = 'block'; // só para mostrar
            gradeSpan.innerText = 'JOGANDO...';
            // notas falsas/longas sao apenas conceito
        });

        // final de jogo simulado (botao "tentar novamente" gera resultado)
        document.getElementById('playAgainBtn').addEventListener('click', ()=>{
            if (gameActive) gameActive = false; // parar

            let perc = totalNotes>0 ? (hitScore/totalNotes*100) : 0;
            finalPercent.innerText = perc.toFixed(4)+'%';
            maxComboSpan.innerText = maxComboValue;
            perfectSpan.innerText = perfect;
            verygoodSpan.innerText = verygood;
            goodSpan.innerText = good;
            badSpan.innerText = bad;
            missSpan.innerText = miss;

            // Grade
            if (perc === 100) gradeSpan.innerText = 'S+';
            else if (perc >= 85) gradeSpan.innerText = 'S';
            else if (perc >= 75) gradeSpan.innerText = 'A';
            else if (perc >= 56) gradeSpan.innerText = 'B';
            else if (perc >= 41) gradeSpan.innerText = 'C';
            else if (perc >= 26) gradeSpan.innerText = 'D';
            else if (perc >= 16) gradeSpan.innerText = 'E';
            else gradeSpan.innerText = 'F';

            // Reset gameactive
            gameActive = false;
        });

        // toggle comemoração
        toggleCelebBtn.addEventListener('click', ()=>{
            celebrationEnabled = !celebrationEnabled;
            toggleCelebBtn.style.opacity = celebrationEnabled ? '1' : '0.5';
        });

        // feedback - caixa de entrada do dono (simulação)
        document.getElementById('feedbackBtn').addEventListener('click', ()=>{
            let feedback = prompt("Escreva seu feedback (aparecerá na caixa de entrada do dono):");
            if (feedback) {
                alert("📬 Feedback enviado! (simulado: '" + feedback + "' apareceria na sua caixa de entrada)");
                // Aqui você pode implementar um mailto ou backend
            }
        });

        // tutorial
        document.getElementById('tutorialBtn').addEventListener('click', ()=>{
            alert("🎹 TUTORIAL:\nTeclas: A S D F ou toque nas teclas roxas.\nNotas longas: segure (simulado).\nNotas falsas: aparecem em dificuldade alta.\nMargem de erro automática.\nAcertos: Perfect
