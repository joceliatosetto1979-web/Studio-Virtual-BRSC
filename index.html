<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Piano Mágico | Gravação de Sons e Efeitos</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Container principal */
        .piano-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 48px;
            padding: 24px 20px 30px 20px;
            backdrop-filter: blur(2px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        /* Área do teclado rolável horizontalmente */
        .keyboard-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 12px;
            cursor: grab;
            scroll-behavior: smooth;
            border-radius: 28px;
        }
        .keyboard-wrapper:active {
            cursor: grabbing;
        }
        .keyboard {
            display: flex;
            flex-direction: row;
            background: #0b1219;
            border-radius: 24px;
            padding: 16px 12px;
            gap: 2px;
            min-width: max-content;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 8px 18px rgba(0,0,0,0.3);
        }

        /* Estilo das teclas brancas */
        .white-key {
            width: 70px;
            height: 220px;
            background: linear-gradient(145deg, #fef9e8, #fff5e0);
            border-radius: 0 0 16px 16px;
            border: 1px solid #ddd2b0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2), inset 0 1px 0 #ffffffcc;
            cursor: pointer;
            transition: all 0.05s linear;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 18px;
            font-weight: 600;
            color: #2c3e44;
            font-size: 1rem;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        /* Teclas pretas */
        .black-key {
            width: 42px;
            height: 135px;
            background: linear-gradient(145deg, #1e272e, #0a0f14);
            margin-left: -21px;
            margin-right: -21px;
            border-radius: 0 0 12px 12px;
            z-index: 2;
            box-shadow: 0 6px 10px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.05s linear;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 18px;
            color: #ecd9b4;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .white-key:active, .black-key:active, .playing {
            transform: translateY(4px);
            filter: brightness(0.94);
            transition: 0.02s;
        }

        /* Painel de controle */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 28px;
            margin-bottom: 15px;
            align-items: center;
        }

        button, .mode-toggle {
            background: #2c3e2f;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(4px);
            background: rgba(30, 40, 45, 0.9);
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
            transition: 0.1s ease;
            font-family: inherit;
            border: 1px solid rgba(255,215,150,0.5);
        }
        button:active {
            transform: scale(0.96);
        }
        .record-btn {
            background: #aa2e4e;
            box-shadow: 0 0 6px #ff6680;
        }
        .record-btn.recording {
            background: #e34d6e;
            animation: pulseRed 1s infinite;
            box-shadow: 0 0 14px #ff3366;
        }
        @keyframes pulseRed {
            0% { opacity: 1; background: #e34d6e;}
            50% { opacity: 0.8; background: #ff4d6d;}
            100% { opacity: 1; background: #e34d6e;}
        }

        .mode-toggle {
            background: #2c5a6e;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .mode-toggle.sample-mode {
            background: #9b4b6e;
            box-shadow: 0 0 8px #ffa987;
        }

        .slider-container {
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(4px);
        }
        .slider-container label {
            color: #f3e6c2;
            font-weight: 500;
        }
        input[type="range"] {
            width: 160px;
            height: 5px;
            -webkit-appearance: none;
            background: #d4c9a5;
            border-radius: 5px;
            outline: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffcf7a;
            cursor: pointer;
            box-shadow: 0 1px 5px black;
        }
        .info-status {
            background: #00000066;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #f5e5c0;
            font-weight: 500;
            text-align: center;
        }
        .sample-wave {
            background: #1a262e;
            border-radius: 32px;
            margin-top: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .badge {
            background: #2b3b2b;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.75rem;
            color: #ffeaac;
        }
        footer {
            text-align: center;
            margin-top: 15px;
            font-size: 0.7rem;
            color: #adad9e;
        }
        @media (max-width: 700px) {
            .white-key { width: 55px; height: 180px; font-size: 0.7rem;}
            .black-key { width: 36px; height: 110px; margin-left: -18px; margin-right: -18px;}
            button { padding: 6px 14px; font-size: 0.8rem;}
        }
    </style>
</head>
<body>
<div>
    <div class="piano-container">
        <div class="keyboard-wrapper" id="scrollWrapper">
            <div class="keyboard" id="pianoKeyboard">
                <!-- Teclas serão geradas via JS -->
            </div>
        </div>

        <div class="control-panel">
            <button id="recordBtn" class="record-btn">🎙️ Gravar Som</button>
            <button id="stopRecordBtn" class="record-btn">⏹️ Parar</button>
            <button id="playSampleBtn">🔊 Tocar Sample Gravado</button>
            <div id="modeToggle" class="mode-toggle">🎛️ Modo: Piano Normal</div>
        </div>

        <div class="slider-container">
            <label>🎚️ Faixa / Ganho do Sample:</label>
            <input type="range" id="sampleGainSlider" min="0" max="2" step="0.01" value="0.9">
            <span id="gainValue" class="badge">0.90x</span>
        </div>

        <div class="sample-wave">
            <span class="badge" id="sampleStatus">📼 Nenhum sample gravado</span>
            <span class="badge" id="durationInfo">⏱️ Duração: -- s</span>
            <span class="badge" id="modeIndicator">🎹 Piano clássico</span>
        </div>
        <footer>✨ Role horizontalmente | Grave qualquer som → toque no piano com o sample | Ajuste volume do sample</footer>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. Notas musicais (12 tons) + Mapeamento visual
    // --------------------------------------------------------------
    const NOTES = [
        { name: "C",  freq: 261.63, type: "white" },  // Dó4
        { name: "C#", freq: 277.18, type: "black" },
        { name: "D",  freq: 293.66, type: "white" },
        { name: "D#", freq: 311.13, type: "black" },
        { name: "E",  freq: 329.63, type: "white" },
        { name: "F",  freq: 349.23, type: "white" },
        { name: "F#", freq: 369.99, type: "black" },
        { name: "G",  freq: 392.00, type: "white" },
        { name: "G#", freq: 415.30, type: "black" },
        { name: "A",  freq: 440.00, type: "white" },
        { name: "A#", freq: 466.16, type: "black" },
        { name: "B",  freq: 493.88, type: "white" }
    ];

    // Expandir 3 oitavas para ter boa rolagem (C3 até B5)
    const OCTAVES = 3;
    const START_OCTAVE = 3; // Dó3
    let fullKeyboard = [];
    for (let oct = 0; oct < OCTAVES; oct++) {
        for (let i = 0; i < NOTES.length; i++) {
            let note = NOTES[i];
            let octaveReal = START_OCTAVE + oct;
            let freq = note.freq * Math.pow(2, oct);
            let displayName = note.name + octaveReal;
            fullKeyboard.push({
                id: `${note.name}${octaveReal}`,
                name: note.name,
                freq: freq,
                type: note.type,
                displayName: displayName
            });
        }
    }

    // --------------------------------------------------------------
    // 2. Áudio Web Audio API
    // --------------------------------------------------------------
    let audioCtx = null;
    let masterGain = null;
    let sampleBuffer = null;       // armazena AudioBuffer do sample gravado
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordedBlob = null;
    let recordedAudioUrl = null;
    let sampleModeActive = false;   // true = tocar sample nas teclas, false = piano normal

    // Controle de ganho do sample
    let sampleGainValue = 0.9;
    const gainSlider = document.getElementById('sampleGainSlider');
    const gainSpan = document.getElementById('gainValue');

    // UI Elements
    const recordBtn = document.getElementById('recordBtn');
    const stopRecordBtn = document.getElementById('stopRecordBtn');
    const playSampleBtn = document.getElementById('playSampleBtn');
    const modeToggleBtn = document.getElementById('modeToggle');
    const sampleStatusSpan = document.getElementById('sampleStatus');
    const durationInfoSpan = document.getElementById('durationInfo');
    const modeIndicatorSpan = document.getElementById('modeIndicator');
    const keyboardDiv = document.getElementById('pianoKeyboard');
    const scrollWrapper = document.getElementById('scrollWrapper');

    // Inicializar áudio (user interaction required, mas ativamos no primeiro toque)
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.35;  // volume global do piano
        masterGain.connect(audioCtx.destination);
    }

    // Tocar nota com oscilador (piano sintetizado simples, mas bonito)
    function playNormalNote(freq, duration = 1.2) {
        if (!audioCtx) initAudio();
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle'; // som suave
        osc.frequency.value = freq;
        gainNode.gain.value = 0.28;
        osc.connect(gainNode);
        gainNode.connect(masterGain);
        osc.start();
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.stop(now + duration);
        // harmônico extra para simular piano
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 2.01;
        gain2.gain.value = 0.08;
        osc2.connect(gain2);
        gain2.connect(masterGain);
        osc2.start();
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + duration * 0.9);
        osc2.stop(now + duration);
    }

    // Tocar sample (buffer gravado) na frequência da tecla (pitch shift)
    function playSampleOnKey(baseFreq) {
        if (!sampleBuffer) {
            // Se não houver sample, toca nota normal como fallback
            playNormalNote(baseFreq);
            return;
        }
        if (!audioCtx) initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const source = audioCtx.createBufferSource();
        source.buffer = sampleBuffer;
        const gainNodeSample = audioCtx.createGain();
        gainNodeSample.gain.value = sampleGainValue;
        // pitch shift: ratio entre a frequência original do sample (vamos detectar ou usar nota base média)
        // Para manter musicalidade: mapeamos a frequência da tecla para a taxa de reprodução.
        // O sample original tem uma frequência "fundamental" média. Mas vamos adotar um método interessante:
        // consideramos que o sample foi gravado em "tom de referência" 440Hz. Logo rate = baseFreq / 440.
        // Dá efeito de sample esticado, bem divertido.
        let referencePitch = 440.0; 
        let playbackRate = baseFreq / referencePitch;
        // Limites para não distorcer demais
        playbackRate = Math.min(2.5, Math.max(0.4, playbackRate));
        source.playbackRate.value = playbackRate;
        source.connect(gainNodeSample);
        gainNodeSample.connect(masterGain);
        source.start();
        // fade out suave no final
        const duration = sampleBuffer.duration / playbackRate;
        gainNodeSample.gain.setValueAtTime(sampleGainValue, audioCtx.currentTime);
        gainNodeSample.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    }

    // Função de toque geral (modo sample ou piano)
    function playKey(freq, noteName) {
        if (!audioCtx) initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (sampleModeActive && sampleBuffer) {
            playSampleOnKey(freq);
        } else {
            playNormalNote(freq);
        }
        // efeito visual
    }

    // Construir teclado DOM
    function buildKeyboard() {
        keyboardDiv.innerHTML = '';
        fullKeyboard.forEach((key, idx) => {
            const keyDiv = document.createElement('div');
            keyDiv.className = key.type === 'white' ? 'white-key' : 'black-key';
            keyDiv.textContent = key.displayName;
            keyDiv.setAttribute('data-freq', key.freq);
            keyDiv.setAttribute('data-name', key.displayName);
            keyDiv.addEventListener('mousedown', (e) => {
                e.preventDefault();
                playKey(key.freq, key.displayName);
                addPlayingClass(keyDiv);
            });
            keyDiv.addEventListener('touchstart', (e) => {
                e.preventDefault();
                playKey(key.freq, key.displayName);
                addPlayingClass(keyDiv);
            });
            keyboardDiv.appendChild(keyDiv);
        });
    }
    function addPlayingClass(el) {
        el.classList.add('playing');
        setTimeout(() => el.classList.remove('playing'), 120);
    }

    // --------------------------------------------------------------
    // 3. Gravação de Áudio (Microfone) com duração mínima 5s, faixa editável via gain slider
    // --------------------------------------------------------------
    async function startRecording() {
        if (isRecording) return;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("Seu navegador não suporta gravação de áudio.");
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            recordedChunks = [];
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/wav' });
                if (blob.size === 0) {
                    sampleStatusSpan.innerText = "⚠️ Nenhum áudio capturado";
                    return;
                }
                // Verificar duração mínima: precisamos decodificar para obter duração
                const fileReader = new FileReader();
                fileReader.onload = async function(e) {
                    const arrayBuffer = e.target.result;
                    if (!audioCtx) initAudio();
                    try {
                        const decoded = await audioCtx.decodeAudioData(arrayBuffer);
                        if (decoded.duration < 5.0) {
                            alert(`O áudio gravado tem apenas ${decoded.duration.toFixed(1)} segundos. É necessário pelo menos 5 segundos para usar no piano. Tente novamente!`);
                            sampleStatusSpan.innerText = `❌ Áudio curto (${decoded.duration.toFixed(1)}s)`;
                            return;
                        }
                        // sucesso, armazenar buffer
                        if (sampleBuffer) sampleBuffer = null;
                        sampleBuffer = decoded;
                        recordedBlob = blob;
                        if (recordedAudioUrl) URL.revokeObjectURL(recordedAudioUrl);
                        recordedAudioUrl = URL.createObjectURL(blob);
                        sampleStatusSpan.innerText = `🎤 Sample carregado! (${decoded.duration.toFixed(1)}s)`;
                        durationInfoSpan.innerText = `⏱️ Duração: ${decoded.duration.toFixed(1)} s`;
                    } catch(err) {
                        console.error(err);
                        alert("Erro ao processar áudio gravado.");
                    }
                };
                fileReader.readAsArrayBuffer(blob);
                // Fechar faixas do stream
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
            recordBtn.classList.add('recording');
            sampleStatusSpan.innerText = "🔴 Gravando... fale algo (mín 5s)";
            // Parar automaticamente após 15 segundos para não ficar eterno, mas usuário pode parar
            setTimeout(() => {
                if (isRecording) stopRecording();
            }, 16000);
        } catch (err) {
            console.error("Microfone erro", err);
            alert("Permissão de microfone necessária para gravar.");
        }
    }

    function stopRecording() {
        if (mediaRecorder && isRecording && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.classList.remove('recording');
        } else {
            if(mediaRecorder && mediaRecorder.state === 'inactive') isRecording = false;
            recordBtn.classList.remove('recording');
        }
    }

    function playRecordedSample() {
        if (!sampleBuffer) {
            alert("Nenhum sample gravado. Grave um som com pelo menos 5 segundos.");
            return;
        }
        if (!audioCtx) initAudio()
